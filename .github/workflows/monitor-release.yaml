name: 'Monitor release'

on:
  schedule:
    - cron: '0 * * * *'
      timezone: 'Europe/Bratislava'
  workflow_dispatch:

jobs:
  check-prerelease:
    runs-on: ubuntu-slim
    permissions:
      contents: write
      actions: write

    steps:
      - name: 'Monitor release'
        uses: stefanbosak/gh-actions/monitor-release@main
        with:
          projects: |
            [
              {"owner":"github","repo":"copilot-cli"}
            ]
